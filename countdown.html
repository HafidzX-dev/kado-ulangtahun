<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⏳ Siap-siap...</title>
    <link rel="stylesheet" href="style/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
</head>
<body class="countdown-page">

    <canvas id="confettiCanvas"></canvas>
    <canvas id="fireworksCanvas"></canvas>

    <div class="countdown-wrapper">
        <div id="countdownBox" class="countdown-box">
            <p class="countdown-label">Bersiap dalam...</p>
            <div id="countdownNum" class="countdown-num">3</div>
        </div>
        
        <div id="birthdayReveal" class="birthday-reveal hidden">
            <h1 class="reveal-title">Selamat Ulang Tahun ke-</h1>
            <div class="reveal-age" id="revealAge">18</div>
            <p class="reveal-subtitle">🎉🎂🎈</p>
        </div>
    </div>

    <script>
        // ===== KONFIGURASI =====
        const AGE = 18; // GANTI UMUR DI SINI

        // ===== COUNTDOWN =====
        let count = 3;
        const countdownNum = document.getElementById('countdownNum');
        const countdownBox = document.getElementById('countdownBox');
        const birthdayReveal = document.getElementById('birthdayReveal');
        const revealAge = document.getElementById('revealAge');

        if (revealAge) {
            const currentHTMLAge = revealAge.textContent.trim();
            if (AGE !== 18 && AGE !== null && AGE !== undefined) {
                revealAge.textContent = AGE;
            }
        }

        const interval = setInterval(() => {
            count--;
            if (count > 0) {
                countdownNum.textContent = count;
                countdownNum.style.animation = 'none';
                countdownNum.offsetHeight;
                countdownNum.style.animation = 'countPop 0.8s ease';
            } else if (count === 0) {
                countdownNum.textContent = '1';
                countdownNum.style.animation = 'countPop 0.8s ease';
            } else {
                clearInterval(interval);
                countdownBox.classList.add('hidden');
                birthdayReveal.classList.remove('hidden');
                startEffects();
                setTimeout(() => {
                    window.location.href = 'main.html';
                }, 5000);
            }
        }, 1000);

        // ===== CONFETTI =====
        const confettiCanvas = document.getElementById('confettiCanvas');
        const ctxC = confettiCanvas.getContext('2d');
        confettiCanvas.width = window.innerWidth;
        confettiCanvas.height = window.innerHeight;

        const colors = ['#ff6b9d', '#c44569', '#f8b500', '#4facfe', '#00f2fe', '#a8edea', '#fed6e3', '#ff4757', '#2ed573', '#ffa502'];
        const confettis = [];

        for (let i = 0; i < 200; i++) {
            confettis.push({
                x: Math.random() * confettiCanvas.width,
                y: Math.random() * confettiCanvas.height - confettiCanvas.height,
                w: Math.random() * 10 + 4,
                h: Math.random() * 6 + 3,
                color: colors[Math.floor(Math.random() * colors.length)],
                speed: Math.random() * 4 + 2,
                angle: Math.random() * 360,
                spin: Math.random() * 0.15 - 0.075,
                sway: Math.random() * 2 - 1
            });
        }

        function drawConfetti() {
            ctxC.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            confettis.forEach(p => {
                ctxC.save();
                ctxC.translate(p.x, p.y);
                ctxC.rotate(p.angle * Math.PI / 180);
                ctxC.fillStyle = p.color;
                ctxC.fillRect(-p.w/2, -p.h/2, p.w, p.h);
                ctxC.restore();

                p.y += p.speed;
                p.x += Math.sin(p.angle * 0.05) * p.sway;
                p.angle += p.spin * 10;

                if (p.y > confettiCanvas.height) {
                    p.y = -20;
                    p.x = Math.random() * confettiCanvas.width;
                }
            });
            requestAnimationFrame(drawConfetti);
        }

        // ===== FIREWORKS =====
        const fwCanvas = document.getElementById('fireworksCanvas');
        const ctxF = fwCanvas.getContext('2d');
        fwCanvas.width = window.innerWidth;
        fwCanvas.height = window.innerHeight;

        const fireworks = [];
        const particles = [];

        class Firework {
            constructor() {
                this.x = Math.random() * fwCanvas.width * 0.8 + fwCanvas.width * 0.1;
                this.y = fwCanvas.height;
                this.targetY = Math.random() * fwCanvas.height * 0.3 + 80;
                this.speed = Math.random() * 3 + 5;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.exploded = false;
            }
            update() {
                if (!this.exploded) {
                    this.y -= this.speed;
                    if (this.y <= this.targetY) {
                        this.explode();
                        this.exploded = true;
                    }
                }
            }
            explode() {
                for (let i = 0; i < 40; i++) {
                    const angle = (Math.PI * 2 / 40) * i;
                    const velocity = Math.random() * 4 + 2;
                    particles.push({
                        x: this.x,
                        y: this.y,
                        vx: Math.cos(angle) * velocity,
                        vy: Math.sin(angle) * velocity,
                        color: this.color,
                        life: 1,
                        size: Math.random() * 3 + 1
                    });
                }
            }
            draw() {
                if (!this.exploded) {
                    ctxF.fillStyle = this.color;
                    ctxF.fillRect(this.x - 1, this.y, 3, 12);
                }
            }
        }

        function drawFireworks() {
            ctxF.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctxF.fillRect(0, 0, fwCanvas.width, fwCanvas.height);

            if (Math.random() < 0.08) fireworks.push(new Firework());

            fireworks.forEach((fw, i) => {
                fw.update();
                fw.draw();
                if (fw.exploded) fireworks.splice(i, 1);
            });

            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.12;
                p.life -= 0.015;

                if (p.life > 0) {
                    ctxF.globalAlpha = p.life;
                    ctxF.fillStyle = p.color;
                    ctxF.beginPath();
                    ctxF.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctxF.fill();
                    ctxF.globalAlpha = 1;
                } else {
                    particles.splice(i, 1);
                }
            });

            requestAnimationFrame(drawFireworks);
        }

        function startEffects() {
            drawConfetti();
            drawFireworks();
        }

        window.addEventListener('resize', () => {
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
            fwCanvas.width = window.innerWidth;
            fwCanvas.height = window.innerHeight;
        });
    </script>

</body>
</html>
